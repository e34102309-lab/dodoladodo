name: Dual Quant Pipeline (V10.3 & Growth)

on:
  schedule:
    # 每天美東時間盤後執行 (如果你打算手動上傳名單後再按按鈕，這個 schedule 也可以留著當備用)
    - cron: '0 22 * * 1-5' 
  workflow_dispatch: # 允許手動點擊按鈕執行

jobs:
  # ==========================================
  # 虛擬機 A：執行 V10.3 價值品質管線
  # ==========================================
  run-value-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: pip install pandas numpy scipy yfinance requests
        
      - name: Run V10.3 Value Pipeline
        env:
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python run_v10_3_pipeline.py 

      - name: Upload Value Pipeline Results
        uses: actions/upload-artifact@v4
        with:
          name: V10_3_Value_Results
          path: V10_3_Alpha_Final.csv
          if-no-files-found: ignore

  # ==========================================
  # 虛擬機 B：執行成長衛星管線 (與 A 同時啟動)
  # ==========================================
  run-growth-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      # 註：已經拔除 lxml 和 html5lib，因為不需要在雲端爬維基百科了
      - name: Install Dependencies
        run: pip install pandas numpy scipy yfinance requests
        
      - name: Run Growth Satellite Pipeline
        env:
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        # 直接執行篩選管線，它會讀取你已經上傳在 Repo 裡的 growth_universe.csv
        run: python run_growth_satellite_pipeline.py

      - name: Upload Growth Pipeline Results
        uses: actions/upload-artifact@v4
        with:
          name: Growth_Satellite_Results
          path: Growth_Satellite_Alpha.csv
          if-no-files-found: ignore
