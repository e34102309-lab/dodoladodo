name: Mode-C Buy-Side PM Agent Pipeline

on:
  schedule:
    # 涵蓋夏令時 (UTC 13:00) 與冬令時 (UTC 14:00) 的開盤前時間點
    - cron: '0 13,14 * * 1-5'
  workflow_dispatch: # 保留手動觸發按鈕

jobs: # 全域只能有一個 jobs 宣告
  run-mode-c-pipeline:
    runs-on: ubuntu-latest
    steps:
      # --- 防禦階段：時間攔截器 ---
      - name: 檢查是否為紐約時間 09:00 (美股開盤前)
        id: time-check
        run: |
          NY_HOUR=$(TZ="America/New_York" date +%H)
          NY_DAY=$(TZ="America/New_York" date +%u) # 1=週一, 5=週五, 6=週六
          
          echo "當前紐約時間小時: $NY_HOUR, 星期: $NY_DAY"
          
          if [ "$NY_HOUR" != "09" ]; then
            echo "❌ 當前紐約時間為 $NY_HOUR 點，非目標 09:00，跳過執行。"
            exit 78
          fi
          
          if [ "$NY_DAY" -gt 5 ]; then
            echo "❌ 週末美股休市，跳過執行。"
            exit 78
          fi
          
          echo "🚀 紐約時間 09:00 確認，屬於美股交易日盤前，放行測試！"

      # --- 進攻階段：核心模型與 Agent 啟動 ---
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ModeC_requirements.txt
          pip install --upgrade yfinance google-genai

      - name: Layer 2 Run Mode-C Quant Engine
        env:
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          SEND_EMAIL: "0"
        run: python AQR_ModeC_Agent_V12.py

      - name: Layer 3 and 4 Run AI Web Evidence and PM Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python run_mode_c_ai_agent.py

      - name: Upload Final Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Mode_C_Real_Time_Outputs
          path: |
            mode_c_screen.csv
            Mode_C_Final_Decision_Memo.md
          if-no-files-found: error
