name: V9 Alpha Hunt Daily Distillation

on:
  schedule:
    # 每天 UTC 時間 22:00 執行 (台灣時間早上 06:00)
    - cron: '0 22 * * 1-5'
  workflow_dispatch: # 允許在 GitHub 網頁上手動點擊執行

jobs:
  run-quant-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scipy yfinance requests

      - name: Ignite V9 Distillation Tower
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
        run: |
          python AQR_Quant_V9_Cloud.py
