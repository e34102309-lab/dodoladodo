name: Mode-C Buy-Side PM Agent Pipeline

on:
  schedule:
    - cron: '0 22 * * 1-5' # 美東時間每週一至週五盤後自動觸發
  workflow_dispatch: # 允許你隨時手動點擊執行

jobs:
  run-mode-c-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ModeC_requirements.txt
        
      - name: Layer 2: Run Mode-C Quant Engine
        env:
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          # 這裡故意將 SEND_EMAIL 設為 0，因為我們要讓後面的 AI Agent 整合全部成果後再發信
          SEND_EMAIL: "0" 
        run: python AQR_ModeC_Agent_V12.py 

      - name: Layer 3 & 4: Run AI Web Evidence & PM Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python run_mode_c_ai_agent.py # 這支檔案我們在第二步建立

      - name: Upload Final Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Mode_C_Real_Time_Outputs
          path: |
            mode_c_screen.csv
            Mode_C_Final_Decision_Memo.md
          if-no-files-found: error
