name: Mode-C Buy-Side PM Agent Pipeline

on:
  schedule:
    # GitHub 排程可能延遲；cron 是啟動條件，不再用執行時鐘二次攔截。
    - cron: '0 1 * * 1-5'
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - '**.py'
      - 'ModeC_requirements.txt'
      - '.github/workflows/alpha_hunt.yml'

concurrency:
  group: mode-c-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ModeC_requirements.txt

      - name: Compile Python Sources
        run: python -m py_compile AQR_ModeC_Agent_V12.py total_market_hunter_v2.py run_mode_c_ai_agent.py

      - name: Run Unit Tests
        run: python -m unittest discover -s tests -v

  run-mode-c-pipeline:
    if: github.event_name != 'pull_request'
    needs: quality-checks
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ModeC_requirements.txt

      - name: Validate Uploaded Universe and Run Quant Engine
        env:
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          SEND_EMAIL: "0"
        run: python AQR_ModeC_Agent_V12.py

      - name: Run AI Web Evidence and PM Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python run_mode_c_ai_agent.py

      - name: Upload Final Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Mode_C_Real_Time_Outputs
          path: |
            mode_c_screen.csv
            mode_c_report.md
            mode_c_agent_payload.json
            Mode_C_Final_Decision_Memo.md
          if-no-files-found: error
