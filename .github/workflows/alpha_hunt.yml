name: Mode-C Buy-Side PM Agent Pipeline

on:
  schedule:
    # 台灣時間早上 09:00 等於 UTC 01:00。美股已完全收盤，適合進行發查
    - cron: '0 1 * * 1-5'
  workflow_dispatch: # 開放手動強制觸發

jobs:
  run-mode-c-pipeline:
    runs-on: ubuntu-latest
    steps:
      # --- 防禦階段：時間攔截與權限覆寫 ---
      - name: 驗證執行時間 (台灣 09:00) 或手動強制放行
        id: time-check
        run: |
          # 1. 第一原理控制流：手動觸發具備最高優先級 (Bypass 絕對時間鎖)
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "🚀 偵測到手動觸發 (workflow_dispatch)，繞過時間檢查，強制放行 Mode-C Pipeline！"
            exit 0
          fi

          # 2. 自動排程邊界條件驗證 (Time Interceptor)
          # 直接鎖定 UTC 01:00 (即台灣時間 09:00)，邏輯最單純
          UTC_HOUR=$(date -u +%H)
          
          echo "當前 UTC 小時: $UTC_HOUR (台灣時間應為 09:00 區間)"
          
          # 允許 1 小時的 GitHub 延遲緩衝 (若在 01:00 ~ 01:59 之間啟動皆放行)
          if [ "$UTC_HOUR" != "01" ]; then
            echo "💡 系統判定：當前非台灣早上 09:00 (UTC 01:00) 區間，安全攔截不執行。"
            exit 0
          fi
          
          echo "🚀 台灣時間 09:00 區間確認，美股數據已定價完畢，系統放行！"

      # --- 進攻階段：核心模型與 Agent 啟動 ---
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ModeC_requirements.txt
          pip install --upgrade yfinance google-genai

      - name: Layer 2 Run Mode-C Quant Engine
        env:
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          SEND_EMAIL: "0"
        run: python AQR_ModeC_Agent_V12.py

      - name: Layer 3 and 4 Run AI Web Evidence and PM Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python run_mode_c_ai_agent.py

      - name: Upload Final Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Mode_C_Real_Time_Outputs
          path: |
            mode_c_screen.csv
            Mode_C_Final_Decision_Memo.md
          if-no-files-found: error # 沒找到產出物時直接報錯，代表 Agent 執行失敗
