name: Mode-C Long-Term Value Research Pipeline

on:
  schedule:
    # GitHub 排程可能延遲；cron 是啟動條件，不再用執行時鐘二次攔截。
    - cron: '0 1 * * 1-5'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '**.py'
      - '**.csv'
      - 'ModeC_requirements.txt'
      - '.github/workflows/alpha_hunt.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.py'
      - '**.csv'
      - 'ModeC_requirements.txt'
      - '.github/workflows/alpha_hunt.yml'

concurrency:
  group: mode-c-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: ModeC_requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ModeC_requirements.txt

      - name: Compile Python Sources
        run: python -m py_compile AQR_ModeC_Agent_V12.py total_market_hunter_v2.py run_mode_c_ai_agent.py build_mode_c_dashboard.py

      - name: Run Unit Tests
        run: python -m unittest discover -s tests -v

  run-mode-c-pipeline:
    if: github.event_name != 'pull_request'
    needs: quality-checks
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: ModeC_requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ModeC_requirements.txt

      - name: Validate Uploaded Universe and Run Quant Engine
        env:
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          SEND_EMAIL: "0"
        run: python AQR_ModeC_Agent_V12.py

      - name: Build Static Research Dashboard
        run: python build_mode_c_dashboard.py

      - name: Upload Static Dashboard Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Alpha_Engine_Static_Dashboard
          path: public
          if-no-files-found: error
          retention-days: 30

      - name: Upload Research Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Mode_C_Long_Term_Value_Outputs
          path: |
            mode_c_screen.csv
            mode_c_shortlist.csv
            mode_c_report.md
            mode_c_agent_payload.json
            public
          if-no-files-found: error
          retention-days: 30
