name: Mode-C Buy-Side PM Agent Pipeline

on:
  schedule:
    - cron: '0 22 * * 1-5' # 美東盤後執行
  workflow_dispatch: # 允許手動觸發

jobs:
  run-mode-c-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scipy requests yfinance google-genai
        
      - name: Execution Layer 2: Mode-C Quant Engine
        env:
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }} # 格式: YourName your-email@example.com
        run: python AQR_ModeC_Agent_V12.py 

      - name: Execution Layer 3 & 4: AI Web & PM Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # 注入 AI 密鑰
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python run_mode_c_ai_agent.py # 我們即將在 Step 2 建立此檔案

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Mode_C_Final_Outputs
          path: |
            mode_c_screen.csv
            Mode_C_Investment_Memo.md
          if-no-files-found: error
